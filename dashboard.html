<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCM Claims Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07090f;color:#eef2fb;min-height:100vh}
.hdr{background:#0c1018;border-bottom:1px solid rgba(99,155,230,.12);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:18px;font-weight:800;color:#eef2fb}
.hdr-sub{font-size:12px;color:#4a6285;margin-top:2px}
.hdr-logo{font-size:11px;font-weight:700;letter-spacing:.12em;color:#2d8cf0;text-transform:uppercase}
.main{max-width:1200px;margin:0 auto;padding:24px 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:#0c1018;border:1px solid rgba(99,155,230,.10);border-radius:12px;padding:16px}
.stat-val{font-size:28px;font-weight:800;color:#eef2fb}
.stat-lbl{font-size:11px;color:#4a6285;margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{background:#111827;border:1px solid rgba(99,155,230,.15);border-radius:8px;padding:9px 14px;color:#eef2fb;font-size:13px;flex:1;min-width:200px;outline:none}
.search:focus{border-color:rgba(45,140,240,.4)}
.filter{background:#111827;border:1px solid rgba(99,155,230,.15);border-radius:8px;padding:9px 12px;color:#eef2fb;font-size:13px;outline:none;cursor:pointer}
.refresh-btn{background:rgba(45,140,240,.15);border:1px solid rgba(45,140,240,.25);border-radius:8px;padding:9px 16px;color:#2d8cf0;font-size:13px;font-weight:600;cursor:pointer}
.refresh-btn:hover{background:rgba(45,140,240,.25)}
.table-wrap{background:#0c1018;border:1px solid rgba(99,155,230,.10);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:#111827}
th{padding:12px 14px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#4a6285;white-space:nowrap}
td{padding:13px 14px;font-size:13px;border-top:1px solid rgba(99,155,230,.06);vertical-align:middle}
tr:hover td{background:rgba(45,140,240,.04)}
.ref{font-weight:700;color:#2d8cf0;font-size:12px}
.phase{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.phase1{background:rgba(0,212,170,.12);color:#00d4aa}
.phase2{background:rgba(45,140,240,.12);color:#60aaff}
.status-sel{background:transparent;border:1px solid rgba(99,155,230,.15);border-radius:6px;padding:4px 8px;color:#eef2fb;font-size:11px;font-weight:600;cursor:pointer;outline:none}
.status-New{color:#f5a623}
.status-In.Progress{color:#2d8cf0}
.status-Closed{color:#7edb6a}
.injured-yes{color:#ff4f6d;font-weight:700}
.injured-no{color:#4a6285}
.empty{text-align:center;padding:60px 20px;color:#4a6285}
.empty-ic{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:60px 20px;color:#4a6285}
.detail-btn{background:rgba(99,155,230,.08);border:1px solid rgba(99,155,230,.12);border-radius:6px;padding:4px 10px;color:#8aa0bf;font-size:11px;cursor:pointer}
.detail-btn:hover{background:rgba(99,155,230,.15);color:#eef2fb}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.on{display:flex}
.modal{background:#0c1018;border:1px solid rgba(99,155,230,.15);border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;color:#4a6285;font-size:20px;cursor:pointer;padding:4px}
.modal-close:hover{color:#eef2fb}
.detail-row{display:grid;grid-template-columns:160px 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(99,155,230,.06);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-lbl{color:#4a6285;font-weight:600}
.detail-val{color:#eef2fb}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">Claims Dashboard</div>
    <div class="hdr-sub">Corporate Claims Management — FNOL Submissions</div>
  </div>
  <div class="hdr-logo">CCM</div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total Claims</div></div>
    <div class="stat"><div class="stat-val" id="statNew" style="color:#f5a623">—</div><div class="stat-lbl">New</div></div>
    <div class="stat"><div class="stat-val" id="statProgress" style="color:#2d8cf0">—</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat"><div class="stat-val" id="statClosed" style="color:#7edb6a">—</div><div class="stat-lbl">Closed</div></div>
    <div class="stat"><div class="stat-val" id="statInjured" style="color:#ff4f6d">—</div><div class="stat-lbl">With Injuries</div></div>
  </div>

  <div class="toolbar">
    <input class="search" id="search" placeholder="Search by name, company, reference…" oninput="filterTable()">
    <select class="filter" id="filterStatus" onchange="filterTable()">
      <option value="">All Statuses</option>
      <option>New</option>
      <option>In Progress</option>
      <option>Closed</option>
    </select>
    <select class="filter" id="filterPhase" onchange="filterTable()">
      <option value="">All Phases</option>
      <option value="1">Phase 1</option>
      <option value="2">Phase 2</option>
    </select>
    <button class="refresh-btn" onclick="loadClaims()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Claim #</th>
          <th>Reference</th>
          <th>Submitted</th>
          <th>Phase</th>
          <th>Company</th>
          <th>Driver</th>
          <th>Accident Type</th>
          <th>Injured</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10" class="loading">Loading claims…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Claim Detail</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let allClaims = [];

async function loadClaims(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="10" class="loading">Loading…</td></tr>';
  try{
    const r = await fetch('/api/get-claims');
    const d = await r.json();
    allClaims = d.claims || [];
    updateStats();
    filterTable();
  }catch(e){
    console.error('loadClaims error:', e);
    document.getElementById('tbody').innerHTML=`<tr><td colspan="10" class="empty"><div class="empty-ic">⚠️</div><div>Failed to load claims.<br><span style="font-size:11px;color:#4a6285">${e.message}</span></div></td></tr>`;
  }
}

function updateStats(){
  document.getElementById('statTotal').textContent    = allClaims.length;
  document.getElementById('statNew').textContent      = allClaims.filter(c=>c.status==='New').length;
  document.getElementById('statProgress').textContent = allClaims.filter(c=>c.status==='In Progress').length;
  document.getElementById('statClosed').textContent   = allClaims.filter(c=>c.status==='Closed').length;
  document.getElementById('statInjured').textContent  = allClaims.filter(c=>(c.injured||'').toLowerCase()==='yes').length;
}

function filterTable(){
  const q      = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const phase  = document.getElementById('filterPhase').value;

  const filtered = allClaims.filter(c=>{
    const txt = [c.claim_number,c.ref_number,c.company,c.driver_name,c.driver_id,c.accident_type,c.location].join(' ').toLowerCase();
    if(q && !txt.includes(q)) return false;
    if(status && c.status!==status) return false;
    if(phase  && String(c.phase)!==phase) return false;
    return true;
  });

  renderTable(filtered);
}

function renderTable(claims){
  if(claims.length===0){
    document.getElementById('tbody').innerHTML='<tr><td colspan="10" class="empty"><div class="empty-ic">📋</div><div>No claims found</div></td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = claims.map(c=>{
    const dt  = c.submitted_at ? new Date(c.submitted_at).toLocaleString('en-US',{dateStyle:'short',timeStyle:'short'}) : '—';
    const inj = (c.injured||'').toLowerCase()==='yes';
    const statusClass = 'status-'+(c.status||'New').replace(' ','.');
    return `<tr>
      <td><div style="font-weight:800;color:#eef2fb;font-size:14px">${c.claim_number||'—'}</div></td>
      <td><div class="ref">${c.ref_number||'—'}</div></td>
      <td style="color:#8aa0bf;font-size:12px">${dt}</td>
      <td><span class="phase phase${c.phase||1}">Phase ${c.phase||1}</span></td>
      <td>${c.company||'—'}</td>
      <td>
        <div style="font-weight:600">${c.driver_name||'—'}</div>
        <div style="font-size:11px;color:#4a6285">${c.driver_id||''}</div>
      </td>
      <td style="font-size:12px;color:#8aa0bf">${c.accident_type||'—'}</td>
      <td class="${inj?'injured-yes':'injured-no'}">${inj?'Yes':'No'}</td>
      <td>
        <select class="status-sel ${statusClass}" onchange="updateStatus(${c.id},this.value,this)">
          <option ${c.status==='New'?'selected':''}>New</option>
          <option ${c.status==='In Progress'?'selected':''}>In Progress</option>
          <option ${c.status==='Closed'?'selected':''}>Closed</option>
        </select>
      </td>
      <td><button class="detail-btn" onclick="showDetail(${c.id})">View</button></td>
    </tr>`;
  }).join('');
}

async function updateStatus(id, status, el){
  el.className='status-sel status-'+status.replace(' ','.');
  try{
    await fetch('/api/get-claims',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,status})
    });
    const c=allClaims.find(x=>x.id===id);
    if(c){ c.status=status; updateStats(); }
  }catch(e){ console.warn('Status update failed',e); }
}

function showDetail(id){
  const c=allClaims.find(x=>x.id===id);
  if(!c) return;
  const dt=c.submitted_at?new Date(c.submitted_at).toLocaleString('en-US',{dateStyle:'full',timeStyle:'short'}):'—';
  document.getElementById('modalTitle').textContent='Claim #'+(c.claim_number||c.ref_number);
  const rows=[
    ['Claim Number',  c.claim_number||'—'],
    ['Reference',    c.ref_number||'—'],
    ['Submitted',    dt],
    ['Phase',        'Phase '+(c.phase||1)],
    ['Status',       c.status||'New'],
    ['Company',      c.company||'—'],
    ['Driver Name',  c.driver_name||'—'],
    ['Driver ID',    c.driver_id||'—'],
    ['Driver Type',  c.driver_type||'—'],
    ['Email',        c.driver_email||'—'],
    ['Phone',        c.driver_phone||'—'],
    ['Accident Type',c.accident_type||'—'],
    ['Location',     c.location||'—'],
    ['Date/Time',    c.date_time||'—'],
    ['Injured',      c.injured||'—'],
    ['Vehicles',     c.vehicles||'—'],
  ];
  document.getElementById('modalBody').innerHTML=rows.map(([l,v])=>
    `<div class="detail-row"><div class="detail-lbl">${l}</div><div class="detail-val">${v}</div></div>`
  ).join('');
  document.getElementById('modalBg').classList.add('on');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('on');
}

// Auto-refresh every 60 seconds
loadClaims();
setInterval(loadClaims, 60000);
</script>
</body>
</html>
